{% extends 'clinica/base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                
                <div class="card-header text-white p-4" style="background-color: #0d6efd; border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-calendar2-plus fs-2 me-3"></i>
                        <div>
                            <h4 class="fw-bold mb-0">Solicitar Espacio</h4>
                            <small class="text-white-50">Envía la petición a Recepción</small>
                        </div>
                    </div>
                </div>
                
                <div class="card-body p-4 bg-white" style="border-bottom-left-radius: 1rem; border-bottom-right-radius: 1rem;">
                    <form method="post" action="{% url 'solicitar_cita_terapeuta' %}">
                        {% csrf_token %}
                        
                       <div class="mb-3">
                            <label for="paciente_nombre" class="form-label text-muted fw-semibold">Paciente <span class="text-danger">*</span></label>
                            <select class="form-select bg-light" id="paciente_nombre" name="paciente_nombre" required>
                                <option value="" disabled selected>Selecciona un paciente registrado...</option>
                                {% for paciente in pacientes %}
                                    <option value="{{ paciente.nombre }}">{{ paciente.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="telefono" class="form-label text-muted fw-semibold">Teléfono del Paciente (Opcional)</label>
                            <input type="text" class="form-control bg-light" id="telefono" name="telefono">
                        </div>

                        <div class="row mb-1">
                            <div class="col-6">
                                <label for="fecha_deseada" class="form-label text-muted fw-semibold">Fecha <span class="text-danger">*</span></label>
                                <input type="date" class="form-control bg-light" id="fecha_deseada" name="fecha_deseada" required>
                            </div>
                            <div class="col-6">
                                <label for="hora_deseada" class="form-label text-muted fw-semibold">Hora <span class="text-danger">*</span></label>
                                <input type="time" class="form-control bg-light" id="hora_deseada" name="hora_deseada" required>
                            </div>
                        </div>
                        <div id="disp-indicator" class="mb-3" style="min-height:1.6rem;"></div>

                        <div class="mb-3">
                            <label for="consultorio" class="form-label text-muted fw-semibold">Consultorio (Opcional)</label>
                            <select class="form-select bg-light" id="consultorio" name="consultorio">
                                <option value="">Sin preferencia</option>
                                {% for c in consultorios %}
                                    <option value="{{ c.id }}">{{ c.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="notas_terapeuta" class="form-label text-muted fw-semibold">Comentarios para Recepción</label>
                            <textarea class="form-control bg-light" id="notas_terapeuta" name="notas_terapeuta" rows="2" placeholder="Ej. Necesito el consultorio 1 porque tiene proyector."></textarea>
                        </div>

                        <div class="d-grid gap-2 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                Enviar a Recepción
                            </button>
                            <a href="{% url 'portal_terapeuta' %}" class="btn btn-light btn-lg text-muted">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    const TERAPEUTA_ID = {{ mi_perfil.id }};

    $(document).ready(function() {
        $('#paciente_nombre').select2({
            placeholder: "Escribe para buscar paciente...",
            allowClear: true,
            width: '100%',
            language: {
                noResults: function() {
                    return "No se encontró ningún paciente con ese nombre";
                }
            }
        });
    });

    let _slots = [];
    let _bloqueado = false;

    async function checkDisponibilidad() {
        const fecha = document.getElementById('fecha_deseada').value;
        const hora  = document.getElementById('hora_deseada').value;
        const el    = document.getElementById('disp-indicator');

        if (!fecha) { el.innerHTML = ''; return; }

        // Consultar la API solo cuando cambia la fecha
        if (checkDisponibilidad._lastFecha !== fecha) {
            checkDisponibilidad._lastFecha = fecha;
            _slots = [];
            _bloqueado = false;
            try {
                const res  = await fetch(`/api/disponibilidad-terapeuta/?fecha=${fecha}&terapeuta=${TERAPEUTA_ID}`);
                const data = await res.json();
                _slots    = data.horarios || [];
                _bloqueado = !!data.bloqueado;
            } catch(e) { el.innerHTML = ''; return; }
        }

        if (!hora) { el.innerHTML = ''; return; }

        // Normalizar hora a HH:MM
        const horaNorm = hora.slice(0, 5);

        if (_bloqueado) {
            el.innerHTML = `<small class="text-danger fw-semibold"><i class="bi bi-x-circle-fill me-1"></i>Tienes la agenda bloqueada ese día.</small>`;
        } else if (_slots.length === 0) {
            el.innerHTML = `<small class="text-danger fw-semibold"><i class="bi bi-x-circle-fill me-1"></i>No tienes disponibilidad configurada ese día.</small>`;
        } else if (_slots.includes(horaNorm)) {
            el.innerHTML = `<small class="text-success fw-semibold"><i class="bi bi-check-circle-fill me-1"></i>Dentro de tu disponibilidad.</small>`;
        } else {
            el.innerHTML = `<small class="text-danger fw-semibold"><i class="bi bi-x-circle-fill me-1"></i>Fuera de tu disponibilidad (tu horario: ${_slots[0]}–${_slots[_slots.length-1]}).</small>`;
        }
    }

    document.getElementById('fecha_deseada').addEventListener('change', checkDisponibilidad);
    document.getElementById('hora_deseada').addEventListener('change', checkDisponibilidad);
</script>
{% endblock %}
